name: CI/CD Push to Azure ACR

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    # 1. Fetch the latest code from the repository
    - name: Checkout repository
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    # 2. Authenticate with Azure Container Registry using Admin credentials
    # This bypasses the interactive MFA prompts by using a direct secure token
    - name: Log in to Azure Container Registry
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
      with:
        registry: ${{ secrets.ACR_LOGIN_SERVER }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    # 3. Build the Docker image and push it to Azure
    # The image is tagged with both ':latest' and the specific git commit SHA for traceability
    - name: Build and Push Docker image
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.ACR_LOGIN_SERVER }}/ai_personal_data_cleaner-server:latest
          ${{ secrets.ACR_LOGIN_SERVER }}/ai_personal_data_cleaner-server:${{ github.sha }}
